name: job15394018
description: Generate emissions for job 15394018
tags: null
aggregation:
  metrics:
    - energy
    - carbon/operational
    - carbon/embodied
    - carbon
    - sci
  type: both
initialize:
  plugins:
    calculate-energy:
      path: builtin
      method: Multiply
      config:
        input-parameters:
          - duration-hours
          - kilowatts
        output-parameter: energy
    cpu-lookup:
      path: builtin
      method: CSVLookup
      config:
        filepath: ./resources/cpu-model.csv
        output: '*'
        query:
          node: node-name
    duration-to-hours:
      path: builtin
      method: Coefficient
      config:
        coefficient: 0.016666666666666666
        input-parameter: duration
        output-parameter: duration-hours
    sci:
      path: builtin
      method: Sci
      config:
        functional-unit: job
    sci-m:
      path: builtin
      method: SciEmbodied
      mapping:
        vCPUs: cores-allocated
      config:
        duration: 60
        lifespan: 157800000
        output-parameter: carbon/embodied
      parameter-metadata:
        outputs:
          carbon/embodied:
            unit: gCO2eq
            description: Total embodied carbon
            aggregation-method:
              time: sum
              component: sum
    sci-o:
      path: builtin
      method: Multiply
      config:
        input-parameters:
          - grid/carbon-intensity
          - energy
        output-parameter: carbon/operational
      parameter-metadata:
        outputs:
          carbon/operational:
            unit: gCO2eq/KWh
            description: Total operational carbon
            aggregation-method:
              time: sum
              component: sum
    sum-carbon:
      path: builtin
      method: Sum
      config:
        input-parameters:
          - carbon/operational
          - carbon/embodied
        output-parameter: carbon
    usage-to-wattage:
      path: builtin
      method: Multiply
      config:
        input-parameters:
          - cpu/utilization
          - watts-per-core
        output-parameter: wattage-scaled
    utilization:
      path: builtin
      method: Divide
      config:
        denominator: cpu/total-seconds
        numerator: cpu/user-seconds
        output: cpu/utilization
    watts-to-kw:
      path: builtin
      method: Coefficient
      config:
        coefficient: 0.001
        input-parameter: wattage-scaled
        output-parameter: kilowatts
