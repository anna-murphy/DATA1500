  <text class="cls-11" transform="translate(461.34 315.07)"><tspan x="0" y="0">Source: Oscar Prometheus &amp; Slurm Databases. </tspan><tspan x="-268.14" y="12">Analysis utilized the Green Software </tspan><tspan class="cls-27" x="-103.25" y="12">F</tspan><tspan x="-97.79" y="12">oundatio</tspan><tspan class="cls-17" x="-59.08" y="12">n</tspan><tspan class="cls-7" x="-53.5" y="12">’</tspan><tspan x="-51.63" y="12">s Impact </tspan><tspan class="cls-10" x="-12.31" y="12">F</tspan><tspan class="cls-21" x="-6.8" y="12">r</tspan><tspan x="-2.9" y="12">amework. Carbon equivalencies from the E</tspan><tspan class="cls-9" x="188" y="12">P</tspan><tspan x="193.12" y="12">A.</tspan></text>
  <text class="cls-15" transform="translate(238.64 133.58)"><tspan x="0" y="0">The dirtiest job this month lasted almost 4 d</tspan><tspan class="cls-19" x="269.44" y="0">a</tspan><tspan x="276.22" y="0">ys and </tspan><tspan x="0" y="16.8">emitted 66.7 kg of CO2 — equivalent to driving 170 </tspan><tspan x="0" y="33.6">miles in the </tspan><tspan class="cls-19" x="74.69" y="33.6">a</tspan><tspan class="cls-28" x="81.47" y="33.6">v</tspan><tspan x="89.79" y="33.6">e</tspan><tspan class="cls-18" x="96.75" y="33.6">r</tspan><tspan x="102.23" y="33.6">age gas powered ca</tspan><tspan class="cls-22" x="221.87" y="33.6">r</tspan><tspan x="226.69" y="33.6">.</tspan></text>
